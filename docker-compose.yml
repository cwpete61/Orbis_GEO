version: '3.8'

services:
  orbis-local:
    build:
      context: .
      network: host
    container_name: orbis-local-app
    ports:
      - "3000:3000"
    volumes:
      # Mount the static leads database file to track form submissions
      - ./leads.json:/app/leads.json
      # Optional: Mount the PDF to easily read it directly from the host machine without bash
      - ./ORBIS-LOCAL-LIVE-REPORT.pdf:/app/ORBIS-LOCAL-LIVE-REPORT.pdf
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    restart: always
